services:
  - type: web
    name: kodex-downloader
    runtime: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    preDeployCommand: |
      apt-get update && apt-get install -y python3 python3-pip
      pip3 install yt-dlp --upgrade --target /usr/local/bin
      chmod +x /usr/local/bin/yt-dlp
    envVars:
      - key: NODE_ENV
        value: production
