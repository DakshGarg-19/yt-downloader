services:
  - type: web
    name: kodex-downloader
    runtime: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NODE_ENV
        value: production
    preDeployCommand: "apt-get update && apt-get install -y python3 python3-pip && pip3 install yt-dlp"
